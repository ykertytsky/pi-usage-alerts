name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - name: Verify release tag matches package.json version
        run: |
          pkg_version="v$(node -p "require('./package.json').version")"
          if [ "$pkg_version" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json ($pkg_version)"
            exit 1
          fi
      # Auth comes from the OIDC trusted publisher (id-token: write) — no NPM_TOKEN.
      - run: npm publish --provenance --access public
